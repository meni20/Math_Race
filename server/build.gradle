plugins {
    id 'java'
    id 'org.springframework.boot' version '3.4.2'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.asphalt8'
version = '0.0.1-SNAPSHOT'

def projectPathHasOnlyAscii = projectDir.absolutePath.chars().allMatch { it < 128 }
if (!projectPathHasOnlyAscii) {
    def safeBuildName = rootProject.name.replaceAll(/[^A-Za-z0-9._-]/, '-')
    buildDir = file(new File(System.getProperty('java.io.tmpdir'), safeBuildName).absolutePath)
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-websocket'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    runtimeOnly 'org.postgresql:postgresql'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

tasks.named('test') {
    useJUnitPlatform()
}
