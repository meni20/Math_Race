spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/asphalt8}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

app:
  persistence:
    mode: postgres
